entity_id: CON:L0:zeit-these
typ: Concept
layer: L0
name: "Grundthese – Musik erzeugt Zeit"
domain: KON
status: '[W]'
definition: >
  Grundaxiom der Kontrakomologie. Zeit ist nicht der Rahmen, in dem Musik (und
  Realität) stattfindet – Musik erzeugt Zeit. Realität wird als vielstimmige Fuge
  gelesen, in der widersprüchliche Wahrheiten gleichzeitig gelten, ohne sich
  aufzuheben (kontrapunktische Koexistenz).
enables:
