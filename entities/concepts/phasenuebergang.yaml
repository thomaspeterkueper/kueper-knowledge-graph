name: Phasenübergang
domain: KON
status: '[W]'
definition: >
  Die Wirkung eines AVI-Punktes: der Übergang, bei dem eine Zeitarchitektur ihren
  qualitativen Charakter nicht graduell, sondern sprunghaft ändert. Kein Zustand,
  sondern der Vollzug des Umschlags von einer Zeitqualität in eine andere.
  Paradigmatisch das A2 in Takt 212 von Chopins 4. Ballade (⨂ Tura): der Punkt der
  Spannungsentladung, nach dem die kontrapunktische Ordnung zusammenbricht.
