name: "OEM (Omnizedentes Entfaltungsmodul)"
domäne: KON
status: '[W]'
beschreibung: >
  Strukturelle Einheit mit dem Charakter einer Funktion (Abbildung Offenheit →
  Offenheit), die einen vollständigen Prozess durchläuft: von einer Form der Offenheit
  durch einen Phasenübergang in eine neue, veränderte Offenheit. Kann ein Ton, ein
  Motiv, ein Abschnitt oder ein ganzes Werk sein. Kein Zustand, sondern ein Prozess;
  bidirektional lesbar (evolutionär/involutiv).
