name: "⧛ Chrona"
domain: OMNI
status: '[W]'
definition: >
  Zeitqualität, Chronologie. Erweitertes Symbol (Stufe II, stabilisiert) im
  Anwendungsbereich temporale Struktur: die alltäglich erlebte, gelebte Zeit
  – mal zäh, mal rasend, meist als gerader Fluss wahrgenommen. Real erlebt,
  aber nicht fundamental (im Unterschied zu ∅ Avi, dem Wurzelmoment vor jeder
  Zeitqualität).
