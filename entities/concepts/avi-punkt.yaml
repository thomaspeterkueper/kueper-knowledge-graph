  dem physikalisch-kosmologischen Modell AVI (Axiomatisches Vakuum-Integral) –
  beide leiten sich aus ∅ Avi ab –, bleibt davon aber als eigenständige Entität im
  musikalisch-künstlerischen Register getrennt.
