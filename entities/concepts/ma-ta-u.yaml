name: "Ma'Ta'U"
domain: KON
status: '[W]'
definition: >
  Resonanz mit erhaltener Differenz. Das 'Ta' ist das Zeichen für Grenze, für das
  Andere – die Anerkennung, dass es jemanden außer dir gibt. Gleiche Wurzel wie Ma'U,
  eine Silbe Unterschied; dadurch bleibt das Selbst erhalten, während die Resonanz
  besteht. Gleichrangiges Gegensatzpaar mit Ma'U.
