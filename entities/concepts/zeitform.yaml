name: Zeitform
domain: KON
status: '[W]'
definition: >
  Grundeinheit der kontrakomologischen Analyse. Beschreibt, wie ein Werk Zeit
  erzeugt und welche Qualität Zeit in ihm annimmt (gleichzeitig, offen, retrograd,
  transformativ, stehend). Keine metrische Kategorie, kein Tempo. Offenes System –
  jedes Werk kann eine weitere Zeitform zeigen.
