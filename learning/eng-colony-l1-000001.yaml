notes: >
  Standortkriterien: Ressourcen (Wasser, Metalle), Sonnenlicht (Energie),
  Strahlung (Abschirmung durch Felsen oder Atmosphaere).
  Lebenserhaltung Minimalset: O2 (Elektrolyse), H2O (Recycling >95%),
  Nahrung (1500 kcal/Tag/Person, 2kg Vorrat/Tag).
  Erstversorgung: kritisches Zeitfenster 0-90 Tage, bis lokale Produktion laeuft.
  ISRU (In-Situ Resource Utilization): Treibstoff, Baumaterial aus lokalem Gestein.
  NOXIA: Kolonie-Gruendungs-Gate, Pioneer-Schiff freischalten.
