learning_goals:
  - Der Spieler versteht, dass das Sonnensystem aus Sonne, Planeten, Zwergplaneten, Monden, Asteroiden und Kometen besteht.
  - Der Spieler unterscheidet innere Planeten, aeussere Planeten, Asteroidenguertel und transneptunische Objekte.
  - Der Spieler erkennt Mars und Ceres als fruehe NOXIA-Orte mit unterschiedlicher Ressourcensituation.
core_explanation: >
  Das Sonnensystem ist kein leerer Raum mit einzelnen Planeten, sondern eine geordnete Struktur. Innen liegen kleine felsige Planeten. Weiter aussen folgen Asteroidenguertel, Gasriesen, Eisriesen und transneptunische Koerper. Fuer NOXIA bedeutet das: Jede Route, jede Kolonie und jede Ressource haengt davon ab, wo ein Objekt in dieser Struktur liegt.
exercise:
  type: multiple_choice
  question: Warum ist Ceres fuer ein fruehes Raumfahrt- und Handelsspiel interessant?
  options:
    - Weil Ceres ein Stern ist.
    - Weil Ceres im Asteroidenguertel liegt und Ressourcen- sowie Logistikfragen verbindet.
    - Weil Ceres groesser als Mars ist.
    - Weil Ceres keine Gravitation hat.
  correct: 1
  explanation: Ceres liegt im Asteroidenguertel und verbindet Planetologie, Ressourcen und Transportlogistik.
